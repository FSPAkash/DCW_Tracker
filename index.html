<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage: #6b9c76;
      --sage-dark: #4a7d56;
      --sage-light: #98c4a3;
      --sage-subtle: rgba(107,156,118,0.08);
      --sage-border: rgba(107,156,118,0.18);
      --sage-glow: rgba(107,156,118,0.25);
      --mint: #7bbf8f;
      --mint-light: #b5e0c4;
      --purple: #8b7ec8;
      --purple-dark: #6b5fa8;
      --purple-light: #b0a6dc;
      --purple-subtle: rgba(139,126,200,0.08);
      --purple-border: rgba(139,126,200,0.18);
      --purple-glow: rgba(139,126,200,0.25);
      --stone: #8a8a80;
      --stone-light: #b8b8b0;
      --warm-grey: #9e9a94;
      --green-done: #5aab6a;
      --green-done-bg: rgba(90,171,106,0.10);
      --red: #c4706a;
      --red-bg: rgba(196,112,106,0.08);
      --red-border: rgba(196,112,106,0.16);
      --red-glow: rgba(196,112,106,0.20);
      --amber: #c4a24e;
      --amber-bg: rgba(196,162,78,0.08);
      --amber-border: rgba(196,162,78,0.18);
      --bg: #ededea;
      --text-primary: #2a2a26;
      --text-secondary: rgba(42,42,38,0.58);
      --text-tertiary: rgba(42,42,38,0.34);
      --glass: rgba(255,255,255,0.35);
      --glass-border: rgba(255,255,255,0.50);
      --glass-strong: rgba(255,255,255,0.55);
      --glass-border-strong: rgba(255,255,255,0.68);
      --shadow: 0 8px 32px rgba(42,42,38,0.05), 0 2px 8px rgba(42,42,38,0.02);
      --shadow-hover: 0 16px 48px rgba(42,42,38,0.07), 0 4px 12px rgba(42,42,38,0.03);
      --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.75), inset 0 -1px 0 rgba(0,0,0,0.01);
      --radius: 20px;
      --radius-sm: 14px;
      --radius-xs: 8px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
      

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
      background: var(--bg);

      background-attachment: fixed;
    }

    .bg-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 100% 60% at 20% -10%, rgba(107,156,118,0.16), transparent 60%),
        radial-gradient(ellipse 80% 55% at 85% 10%, rgba(139,126,200,0.13), transparent 55%),
        radial-gradient(ellipse 70% 50% at 10% 80%, rgba(139,126,200,0.08), transparent 50%),
        radial-gradient(ellipse 90% 45% at 75% 80%, rgba(107,156,118,0.07), transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 45%, rgba(255,255,255,0.15), transparent 50%);
    }


    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    button:disabled { cursor: not-allowed; opacity: 0.35; }
    input, select, textarea { font-family: inherit; font-size: inherit; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 10px; }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(50px) saturate(1.8);
      -webkit-backdrop-filter: blur(50px) saturate(1.8);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow), var(--shadow-inset);
      position: relative;
    }
    .glass::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(165deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0.03) 45%, transparent 100%);
      pointer-events: none; z-index: 1;
    }
    .glass > * { position: relative; z-index: 2; }
    .glass:hover { box-shadow: var(--shadow-hover), var(--shadow-inset); }

    .glass-strong {
      background: var(--glass-strong);
      backdrop-filter: blur(60px) saturate(2.0);
      -webkit-backdrop-filter: blur(60px) saturate(2.0);
      border: 1px solid var(--glass-border-strong);
      box-shadow: var(--shadow), var(--shadow-inset);
      position: relative;
    }
    .glass-strong::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(165deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.05) 45%, transparent 100%);
      pointer-events: none; z-index: 1;
    }
    .glass-strong > * { position: relative; z-index: 2; }
    .glass-strong:hover { box-shadow: var(--shadow-hover), var(--shadow-inset); }

    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(237,237,234,0.55);
      backdrop-filter: blur(60px) saturate(2.0);
      -webkit-backdrop-filter: blur(60px) saturate(2.0);
      border-bottom: 1px solid rgba(255,255,255,0.4);
      animation: fadeDown 0.5s cubic-bezier(0.16,1,0.3,1) both;
      box-shadow: 0 4px 30px rgba(0,0,0,0.03), inset 0 -1px 0 rgba(255,255,255,0.5);
    }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }

    .header-inner {
      max-width: 1400px; margin: 0 auto; padding: 0 36px;
      height: 80px; display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .brand-marks { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    }
    .brand-mark img {
    height: 100%;
    width: auto;
    object-fit: contain;
    display: block;
    }
    .brand-separator {
      width: 2px; height: 28px;
      background: linear-gradient(180deg, transparent, rgba(139,126,200,0.8), transparent);
    }
    .header-title {
      font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--sage-dark), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-right { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }

    .header-center {
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .week-dial {
      display: flex; align-items: center; gap: 0;
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 50px; padding: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.7);
      user-select: none; transition: all 0.3s;
    }
    .week-dial:hover {
      box-shadow: 0 6px 28px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.7), 0 0 34px rgba(139,126,200,0.06);
      background: rgba(255,255,255,0.45);
    }
    .dial-arrow {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    .dial-arrow:not(:disabled):hover { background: rgba(139,126,200,0.12); color: var(--purple); transform: scale(1.12); }
    .dial-arrow:active:not(:disabled) { transform: scale(0.88); }
    .dial-center {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2px 20px; min-width: 210px; cursor: pointer;
      border-radius: 40px; transition: all 0.25s;
    }
    .dial-center:hover { background: rgba(0,0,0,0.02); }
    .dial-label {
      font-size: 13px; font-weight: 600; letter-spacing: -0.01em;
      color: var(--text-primary); white-space: nowrap; line-height: 1.3;
    }
    .dial-sublabel {
      font-size: 9px; font-weight: 500; color: var(--text-tertiary);
      letter-spacing: 0.02em; margin-top: 1px;
    }
    .this-week-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--purple), var(--sage));
      color: white; font-size: 7px; font-weight: 700;
      padding: 1px 7px; border-radius: 10px; margin-left: 7px;
      letter-spacing: 0.05em; vertical-align: middle;
      animation: badgePop 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes badgePop { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }

    .week-dropdown {
      position: absolute; top: calc(100% + 10px); left: 50%;
      transform: translateX(-50%) translateY(8px);
      width: 320px; max-height: 400px; overflow-y: auto;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(70px) saturate(2.0);
      -webkit-backdrop-filter: blur(70px) saturate(2.0);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 22px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.10), 0 4px 18px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.7);
      opacity: 0; visibility: hidden;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      z-index: 200; padding: 10px;
    }
    .week-dropdown::before {
      content: ''; position: absolute;
      top: -6px; left: 50%; transform: translateX(-50%) rotate(45deg);
      width: 12px; height: 12px;
      background: rgba(255,255,255,0.72);
      border-top: 1px solid rgba(255,255,255,0.6);
      border-left: 1px solid rgba(255,255,255,0.6);
    }
    .week-dropdown.open { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

    .wd-month-label {
      font-size: 9px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--purple); padding: 12px 14px 5px;
    }
    .wd-week-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-radius: 13px;
      cursor: pointer; transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
    }
    .wd-week-item:hover { background: rgba(139,126,200,0.07); color: var(--text-primary); transform: translateX(4px); }
    .wd-week-item.selected { background: rgba(139,126,200,0.12); color: var(--purple-dark); font-weight: 600; }
    .wd-week-item.current::after {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--purple); flex-shrink: 0; margin-left: auto;
      animation: pulse 2s ease infinite;
    }

    .header-btn {
      height: 36px; padding: 0 16px; border-radius: 20px;
      font-size: 12px; font-weight: 600; letter-spacing: -0.01em;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      display: flex; align-items: center; gap: 7px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .header-btn:hover { transform: translateY(-1px); }
    .admin-toggle {
      background: rgba(139,126,200,0.08); color: var(--purple);
      border: 1px solid rgba(139,126,200,0.18);
    }
    .admin-toggle:hover { background: rgba(139,126,200,0.15); }
    .admin-toggle.unlocked {
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      color: white; border-color: var(--purple);
      box-shadow: 0 2px 14px var(--purple-glow);
      animation: adminGlow 2s ease-in-out infinite;
    }
    @keyframes adminGlow {
      0%, 100% { box-shadow: 0 2px 14px var(--purple-glow); }
      50% { box-shadow: 0 4px 28px rgba(139,126,200,0.38); }
    }
    .pdf-btn {
      background: rgba(255,255,255,0.3); color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.4);
    }
    .pdf-btn:hover { background: rgba(255,255,255,0.45); }

    .save-indicator {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      padding: 10px 20px; border-radius: 22px;
      background: linear-gradient(135deg, var(--sage), var(--purple));
      color: white; font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
      opacity: 0; transform: translateY(8px) scale(0.9);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none;
      box-shadow: 0 4px 24px rgba(139,126,200,0.3);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .save-indicator.show { opacity: 1; transform: translateY(0) scale(1); }

    .main-wrap {
      max-width: 1400px; margin: 0 auto; padding: 0 36px 70px;
      position: relative; z-index: 1;
    }

    .status-strip {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 22px; border-radius: var(--radius); margin-top: 20px;
      animation: fadeIn 0.5s cubic-bezier(0.16,1,0.3,1) 0.15s both;
    }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.green { background: var(--sage); box-shadow: 0 0 8px var(--sage-glow); animation: statusPulseGreen 2.5s ease-in-out infinite; }
    .status-dot.amber { background: var(--amber); box-shadow: 0 0 8px rgba(196,162,78,0.25); animation: statusPulseAmber 2.5s ease-in-out infinite; }
    .status-dot.red { background: var(--red); box-shadow: 0 0 8px var(--red-glow); animation: statusPulseRed 1.5s ease-in-out infinite; }
    @keyframes statusPulseGreen {
      0%, 100% { box-shadow: 0 0 8px var(--sage-glow); transform: scale(1); }
      50% { box-shadow: 0 0 18px rgba(107,156,118,0.4); transform: scale(1.2); }
    }
    @keyframes statusPulseAmber {
      0%, 100% { box-shadow: 0 0 8px rgba(196,162,78,0.25); transform: scale(1); }
      50% { box-shadow: 0 0 18px rgba(196,162,78,0.45); transform: scale(1.2); }
    }
    @keyframes statusPulseRed {
      0%, 100% { box-shadow: 0 0 8px var(--red-glow); transform: scale(1); }
      50% { box-shadow: 0 0 22px rgba(196,112,106,0.5); transform: scale(1.3); }
    }
    .status-tag { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .status-tag.green { color: var(--sage-dark); }
    .status-tag.amber { color: var(--amber); }
    .status-tag.red { color: var(--red); }
    .status-select {
      font-size: 12px; font-weight: 600; padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.4); border-radius: 9px;
      background: rgba(255,255,255,0.4); color: var(--text-primary);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      outline: none; cursor: pointer; transition: all 0.2s;
    }
    .status-select:hover { border-color: var(--purple-border); background: rgba(255,255,255,0.55); }
    .status-summary {
      font-size: 14px; color: var(--text-secondary); flex: 1;
      outline: none; min-height: 1em; transition: color 0.2s;
    }
    .status-summary:focus { color: var(--text-primary); }

    .metrics-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-top: 14px;
    }
    .metric-pill {
    border-radius: var(--radius-sm); padding: 18px 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 6px;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    animation: metricSlideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(40px) saturate(1.8); -webkit-backdrop-filter: blur(40px) saturate(1.8);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: 0 4px 20px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.6);
    position: relative;
    }
    .metric-info { display: flex; flex-direction: column; align-items: center; }
    .metric-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-align: center; }
    .metric-pill::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(165deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.1) 30%, transparent 60%);
      pointer-events: none;
    }
    .metric-pill > * { position: relative; z-index: 1; }
    .metric-pill:nth-child(1) { animation-delay: 0.2s; }
    .metric-pill:nth-child(2) { animation-delay: 0.28s; }
    .metric-pill:nth-child(3) { animation-delay: 0.36s; }
    .metric-pill:nth-child(4) { animation-delay: 0.44s; }
    @keyframes metricSlideUp {
      from { opacity: 0; transform: translateY(22px) scale(0.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .metric-pill:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 8px 32px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.7); }
    .metric-num {
      font-size: 32px; font-weight: 700; letter-spacing: -0.03em;
      font-family: 'JetBrains Mono', monospace; transition: transform 0.3s;
    }
    .metric-pill:hover .metric-num { transform: scale(1.12); }
    .metric-num.wins { color: var(--sage); }
    .metric-num.completed { color: var(--green-done); }
    .metric-num.in-progress { color: var(--purple); }
    .metric-num.blocked { color: var(--red); }
    .metric-info { display: flex; flex-direction: column; }
    .metric-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }

    .admin-bar {
      display: flex; align-items: center; gap: 9px;
      margin-top: 18px; padding: 10px 18px;
      background: rgba(139,126,200,0.06);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px dashed rgba(139,126,200,0.22);
      border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600; color: var(--purple);
      animation: fadeIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    .admin-bar-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--purple); animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .gantt-container {
      margin-top: 18px; border-radius: var(--radius);
      overflow: hidden;
      animation: ganttSlideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s both;
      background: rgba(255,255,255,0.32);
      backdrop-filter: blur(50px) saturate(1.8);
      -webkit-backdrop-filter: blur(50px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.48);
      box-shadow: 0 8px 40px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.7);
      position: relative;
    }
    .gantt-container::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(165deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.1) 20%, transparent 45%);
      pointer-events: none; z-index: 1;
    }
    .gantt-container > * { position: relative; z-index: 2; }
    @keyframes ganttSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .gantt-header {
      display: grid; grid-template-columns: 210px 1fr;
      border-bottom: 1px solid rgba(255,255,255,0.35);
    }
    .gantt-header-label {
      padding: 14px 18px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--purple);
    }
    .gantt-days { display: grid; grid-template-columns: repeat(5, 1fr); }
    .gantt-day-header {
      padding: 12px 8px; text-align: center;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-tertiary);
      border-left: 1px solid rgba(255,255,255,0.2); transition: all 0.3s;
    }
    .gantt-day-header .day-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500; color: var(--text-tertiary);
      margin-top: 2px; opacity: 0.7;
    }
    .gantt-day-header.today {
      background: linear-gradient(180deg, rgba(139,126,200,0.1), rgba(139,126,200,0.02));
      color: var(--purple-dark); position: relative;
    }
    .gantt-day-header.today::after {
      content: ''; position: absolute;
      bottom: 0; left: 18%; right: 18%; height: 2.5px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
      border-radius: 2px; animation: todayShimmer 3s ease-in-out infinite;
    }
    @keyframes todayShimmer { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .gantt-day-header.today .day-date { color: var(--purple); opacity: 1; }

    .gantt-section { border-top: 1px solid rgba(255,255,255,0.25); }
    .gantt-section-header {
      display: grid; grid-template-columns: 210px 1fr;
      background: rgba(255,255,255,0.08);
    }
    .gantt-section-title {
      padding: 10px 18px; display: flex; align-items: center; gap: 9px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
    }
    .section-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      animation: sectionDotPulse 3s ease-in-out infinite;
    }
    @keyframes sectionDotPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.35); opacity: 0.65; }
    }
    .section-count {

      color: var(--purple); transition: all 0.3s;
    }
    .gantt-section-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      border-left: 1px solid rgba(255,255,255,0.15);
    }
    .gantt-section-grid > div {
      border-left: 1px solid rgba(255,255,255,0.15); min-height: 30px;
    }

    .gantt-row {
      display: grid; grid-template-columns: 210px 1fr;
      min-height: 48px; border-top: 1px solid rgba(255,255,255,0.15);
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      animation: rowFadeIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rowFadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .gantt-row:hover { background: rgba(139,126,200,0.04); }

    .gantt-row-label {
      padding: 7px 14px; display: flex; align-items: center; gap: 9px;
      font-size: 13px; font-weight: 500; color: var(--text-primary);
      overflow: hidden; border-right: 1px solid rgba(255,255,255,0.15);
    }
    .gantt-row-label .row-text {
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      outline: none; min-width: 0; transition: all 0.2s;
    }
    .gantt-row-label .row-text:focus {
      white-space: normal; overflow: visible;
      background: rgba(255,255,255,0.6); border-radius: 5px; padding: 3px 5px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .gantt-row-label .row-icon {
      width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: white;
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .gantt-row:hover .row-icon { transform: scale(1.15) rotate(5deg); }
    .row-icon.win { background: linear-gradient(135deg, var(--sage), var(--sage-dark)); }
    .row-icon.task { background: linear-gradient(135deg, var(--purple), var(--purple-dark)); }
    .row-icon.done { background: linear-gradient(135deg, var(--green-done), #4a9558); }
    .row-icon.blocker { background: linear-gradient(135deg, var(--red), #a85a54); }
    .row-icon.next { background: linear-gradient(135deg, var(--stone), #727268); }

    .gantt-row-label .delete-btn {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text-tertiary); flex-shrink: 0;
      opacity: 0; transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    .gantt-row:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { background: rgba(196,112,106,0.12); color: var(--red); transform: scale(1.2) rotate(90deg); }

    .gantt-row-track {
      position: relative;
      display: grid; grid-template-columns: repeat(5, 1fr);
    }
    .gantt-row-track .day-cell {
      border-left: 1px solid rgba(255,255,255,0.12); min-height: 48px;
    }

    .gantt-bar {
      position: absolute; top: 7px; bottom: 7px;
      border-radius: 8px; cursor: default;
      display: flex; align-items: center; gap: 7px;
      padding: 0 11px; overflow: hidden;
      transition: box-shadow 0.2s, opacity 0.2s, transform 0.2s;
      z-index: 5;
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    }
    .gantt-bar:hover { transform: translateY(-1px); }
    .gantt-bar.win {
      background: linear-gradient(135deg, rgba(107,156,118,0.28), rgba(152,196,163,0.35));
      border: 1px solid rgba(107,156,118,0.30);
      box-shadow: 0 2px 12px rgba(107,156,118,0.1);
    }
    .gantt-bar.win::after {
      content: ''; position: absolute;
      top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: barShine 5s ease-in-out infinite;
    }
    @keyframes barShine { 0% { left: -100%; } 40% { left: 200%; } 100% { left: 200%; } }
    .gantt-bar.task {
      background: linear-gradient(135deg, rgba(139,126,200,0.22), rgba(176,166,220,0.30));
      border: 1px solid rgba(139,126,200,0.26);
      box-shadow: 0 2px 12px rgba(139,126,200,0.08);
    }
    .gantt-bar.done {
      background: linear-gradient(135deg, rgba(90,171,106,0.18), rgba(90,171,106,0.26));
      border: 1px solid rgba(90,171,106,0.22);
      box-shadow: 0 2px 12px rgba(90,171,106,0.08);
    }
    .gantt-bar.done .bar-text { text-decoration: line-through; opacity: 0.55; }
    .gantt-bar.blocker {
      background: linear-gradient(135deg, rgba(196,112,106,0.20), rgba(196,112,106,0.30));
      border: 1px solid rgba(196,112,106,0.26);
      box-shadow: 0 2px 12px rgba(196,112,106,0.08);
      animation: blockerWiggle 6s ease-in-out infinite;
    }
    @keyframes blockerWiggle {
      0%, 86%, 100% { transform: translateX(0); }
      88% { transform: translateX(-2px); } 90% { transform: translateX(2px); }
      92% { transform: translateX(-2px); } 94% { transform: translateX(2px); }
      96% { transform: translateX(0); }
    }
    .gantt-bar.next {
      background: linear-gradient(135deg, rgba(138,138,128,0.18), rgba(138,138,128,0.26));
      border: 1px solid rgba(138,138,128,0.22); border-style: dashed;
      box-shadow: 0 2px 12px rgba(138,138,128,0.06);
    }
    .gantt-bar.admin-bar-item { cursor: grab; }
    .gantt-bar.admin-bar-item:active { cursor: grabbing; }

    .bar-text {
      font-size: 12px; font-weight: 500; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .bar-owners { display: flex; gap: 3px; flex-shrink: 0; }
    .bar-owner-dot {
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 7px; font-weight: 700; color: white;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.2s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
    .bar-owner-dot:hover { transform: scale(1.3); }

    .gantt-bar .resize-handle {
      position: absolute; top: 0; bottom: 0; width: 8px;
      cursor: col-resize; z-index: 10;
    }
    .resize-handle.left { left: -2px; }
    .resize-handle.right { right: -2px; }

    .owner-row {
      display: flex; align-items: center; gap: 5px; margin-top: 4px;
      padding: 0 14px 7px;
    }
    .owner-picker-btn {
      width: 24px; height: 24px; border-radius: 50%;
      font-size: 8px; font-weight: 700; color: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1); border: 1.5px solid transparent;
    }
    .owner-picker-btn.selected { color: white; border-color: rgba(255,255,255,0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .owner-picker-btn:hover { transform: scale(1.25) rotate(10deg); }

    .task-toggle-row { display: flex; gap: 4px; flex-shrink: 0; }
    .toggle-btn {
      font-size: 10px; font-weight: 600; padding: 3px 10px;
      border-radius: 9px; transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .toggle-btn:hover { transform: scale(1.06); }
    .toggle-btn.check-btn {
      background: rgba(90,171,106,0.12); color: var(--green-done);
      border: 1px solid rgba(90,171,106,0.20);
    }
    .toggle-btn.check-btn:hover { background: rgba(90,171,106,0.20); }
    .toggle-btn.check-btn.active { background: var(--green-done); color: white; }
    .toggle-btn.block-btn {
      background: rgba(196,112,106,0.10); color: var(--red);
      border: 1px solid rgba(196,112,106,0.16);
    }
    .toggle-btn.block-btn:hover { background: rgba(196,112,106,0.18); }
    .toggle-btn.block-btn.active { background: var(--red); color: white; }
    .toggle-btn.undo-btn {
      background: rgba(139,126,200,0.10); color: var(--purple);
      border: 1px solid rgba(139,126,200,0.18);
    }
    .toggle-btn.undo-btn:hover { background: rgba(139,126,200,0.18); }

    .add-row-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 16px; margin: 5px 0 5px 14px;
      font-size: 12px; font-weight: 600; color: var(--text-tertiary);
      border-radius: 9px; transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    .add-row-btn:hover { background: rgba(139,126,200,0.07); color: var(--purple); transform: translateX(4px); }

    .empty-row {
      grid-column: 1 / -1; padding: 14px 18px;
      font-size: 12px; color: var(--text-tertiary); font-style: italic;
    }

    .pin-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(42,42,38,0.2);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .pin-modal.show { opacity: 1; visibility: visible; }
    .pin-box {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(70px) saturate(2.0);
      -webkit-backdrop-filter: blur(70px) saturate(2.0);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 28px;
      box-shadow: 0 36px 110px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.8);
      padding: 36px; width: 360px; text-align: center;
      animation: modalPop 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes modalPop {
      from { transform: scale(0.88) translateY(22px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .pin-title {
      font-size: 18px; font-weight: 700; margin-bottom: 5px;
      background: linear-gradient(135deg, var(--sage-dark), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .pin-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 22px; }
    .pin-row { display: flex; gap: 9px; justify-content: center; margin-bottom: 22px; }
    .pin-digit {
      width: 42px; height: 52px; border-radius: 13px; text-align: center;
      font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
      border: 1.5px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      outline: none; transition: all 0.2s;
    }
    .pin-digit:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-glow); transform: scale(1.05); }
    .pin-digit.error { border-color: var(--red); background: var(--red-bg); animation: pinShake 0.4s ease; }
    @keyframes pinShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
    }
    .pin-actions { display: flex; gap: 9px; justify-content: center; }
    .pin-btn {
      height: 42px; padding: 0 24px; border-radius: 14px;
      font-size: 14px; font-weight: 600; transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    .pin-btn:hover { transform: translateY(-1px); }
    .pin-btn.primary {
      background: linear-gradient(135deg, var(--purple), var(--sage-dark));
      color: white; box-shadow: 0 4px 18px var(--purple-glow);
    }
    .pin-btn.primary:hover { box-shadow: 0 6px 28px var(--purple-glow); }
    .pin-btn.secondary {
      background: rgba(255,255,255,0.35); color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.4);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .pin-btn.secondary:hover { background: rgba(255,255,255,0.5); }

    #patInput {
      width: 100%; padding: 11px 14px; font-size: 14px; font-weight: 500;
      border: 1.5px solid rgba(255,255,255,0.45); border-radius: 13px;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      outline: none; transition: all 0.2s; margin-bottom: 18px;
      font-family: 'JetBrains Mono', monospace;
    }
    #patInput:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-glow); }

    .next-week-divider {
      margin-top: 28px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 18px; padding: 0 4px;
      animation: fadeIn 0.5s cubic-bezier(0.16,1,0.3,1) 0.5s both;
    }
    .next-week-divider-line {
      flex: 1; height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(139,126,200,0.2), transparent);
    }
    .next-week-divider-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--purple); white-space: nowrap;
      padding: 5px 16px;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.45); border-radius: 22px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
      animation: labelFloat 4s ease-in-out infinite;
    }
    @keyframes labelFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

    .next-week-container {
      border-radius: var(--radius); overflow: hidden;
      border: 1.5px dashed rgba(139,126,200,0.20);
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(50px) saturate(1.8);
      -webkit-backdrop-filter: blur(50px) saturate(1.8);
      box-shadow: 0 8px 40px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.5);
      position: relative;
      animation: ganttSlideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s both;
    }
    .next-week-container::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(165deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.08) 25%, transparent 50%);
      pointer-events: none; z-index: 1;
    }
    .next-week-container > * { position: relative; z-index: 2; }

    .confetti-particle { position: fixed; pointer-events: none; z-index: 9999; border-radius: 2px; }
    .confetti-fall { animation: confettiFall 1.6s ease-out forwards; }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(220px) rotate(800deg) scale(0); opacity: 0; }
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16,1,0.3,1) both; }

    @media print {
      .header { position: relative; }
      .admin-toggle, .pdf-btn, .save-indicator, .pin-modal, .floating-orb, .bg-layer { display: none !important; }
      body { background: white; }
      .glass, .glass-strong, .gantt-container, .metric-pill, .next-week-container { background: rgba(0,0,0,0.02); backdrop-filter: none; -webkit-backdrop-filter: none; border-color: rgba(0,0,0,0.08); box-shadow: none; }
      .glass::before, .glass-strong::before, .gantt-container::before, .metric-pill::before, .next-week-container::before { display: none; }
    }

    @media (max-width: 900px) {
      .header-inner { padding: 0 18px; grid-template-columns: auto 1fr auto; }
      .main-wrap { padding: 0 18px 44px; }
      .metrics-row { grid-template-columns: repeat(2, 1fr); }
      .gantt-row-label { min-width: 150px; }
      .gantt-header { grid-template-columns: 150px 1fr; }
      .gantt-row { grid-template-columns: 150px 1fr; }
      .gantt-section-header { grid-template-columns: 150px 1fr; }
      .dial-center { min-width: 160px; padding: 2px 12px; }
      .dial-label { font-size: 11px; }
      .header-title { display: none; }
    }
    @media (max-width: 600px) {
      .metrics-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<script>
  const GIST_ID = '39ae4f6db2a7b659cda64a01f2c00a56';
  const GIST_FILE = 'data.json';
  const ADMIN_PIN = '400570';

  function getGistToken() { return sessionStorage.getItem('gist_pat') || ''; }
  function setGistToken(t) { sessionStorage.setItem('gist_pat', t); }

  const PIN_LENGTH = 6;
  const STORAGE_KEY = 'wtGantt1';

  const MEMBERS = [
    { id:'akash',    name:'Akash',    initial:'AK', color:'#E87A45', skills:[] },
    { id:'trisha',   name:'Trisha',   initial:'TR', color:'#5B8DEF', skills:[] },
    { id:'anirudh',  name:'Anirudh',  initial:'AN', color:'#9b6ec4', skills:[] },
    { id:'sushant',  name:'Sushant',  initial:'SU', color:'#44C4A1', skills:[] }
  ];
  const MM = {};
  MEMBERS.forEach(m => MM[m.id] = m);

  let weekOff = 0, admin = false, allData = {}, gistOk = !!GIST_ID, saveT = null;
  let dropdownOpen = false;

  const WEEKS_FORWARD_ADMIN = 4;
  const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];

  function ws(o) {
    const d = new Date(); d.setHours(0,0,0,0);
    const day = d.getDay();
    d.setDate(d.getDate() - day + (day === 0 ? -6 : 1) + o * 7);
    return d;
  }
  function we(o) { const d = ws(o); d.setDate(d.getDate() + 4); return d; }
  function wk(o) { return ws(o).toISOString().split('T')[0]; }
  function wl(o) {
    const s = ws(o), e = we(o);
    const op = { month:'short', day:'numeric' };
    const a = s.toLocaleDateString('en-US', op), b = e.toLocaleDateString('en-US', op);
    if (s.getFullYear() !== e.getFullYear()) return `${a}, ${s.getFullYear()} -- ${b}, ${e.getFullYear()}`;
    return `${a} -- ${b}, ${e.getFullYear()}`;
  }
  function wlShort(o) {
    const s = ws(o), e = we(o), op = { month:'short', day:'numeric' };
    return s.toLocaleDateString('en-US', op) + ' -- ' + e.toLocaleDateString('en-US', op);
  }
  function getMaxWeek() { return admin ? WEEKS_FORWARD_ADMIN : 0; }
  function getMinWeek() { return 0; }
  function getWeekNum(o) {
    const s = ws(o), start = new Date(s.getFullYear(), 0, 1);
    return Math.ceil(((s - start) / 86400000 + start.getDay() + 1) / 7);
  }
  function getDayDates(o) {
    const s = ws(o), dates = [];
    for (let i = 0; i < 5; i++) { const d = new Date(s); d.setDate(d.getDate() + i); dates.push(d); }
    return dates;
  }
  function isToday(d) { const t = new Date(); t.setHours(0,0,0,0); return d.getTime() === t.getTime(); }

  function lc() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
  function sc() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); } catch {} }
  async function lg() {
    if (!gistOk) return null;
    try {
      const r = await fetch('https://api.github.com/gists/' + GIST_ID, { headers: { 'Accept': 'application/vnd.github.v3+json' }, cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const g = await r.json(), f = g.files[GIST_FILE];

        body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(allData, null, 2) } } })

  }

  function initDrag() {
    document.querySelectorAll('.gantt-bar.admin-bar-item').forEach(bar => {
      const leftH = bar.querySelector('.resize-handle.left');
      const rightH = bar.querySelector('.resize-handle.right');
      const track = bar.parentElement;
      function getDay(clientX) { const rect = track.getBoundingClientRect(); return Math.max(0, Math.min(4, Math.floor((clientX - rect.left) / (rect.width / 5)))); }
      function getItem() {
        const type = bar.dataset.type, idx = parseInt(bar.dataset.index), w = gw(wk(weekOff));
        if (type === 'win') return w.wins[idx]; if (type === 'task') return w.tasks[idx];
        if (type === 'blocker') return w.blockers[idx]; if (type === 'next' || type === 'nextWeek') return w.nextWeek[idx];
        return null;
      }
      if (leftH) leftH.addEventListener('mousedown', e => {
        e.preventDefault(); e.stopPropagation(); const item = getItem(); if (!item) return;
        const onMove = ev => { const d = getDay(ev.clientX); if (d <= (item.endDay!==undefined?item.endDay:4)) { item.startDay = d; bar.style.left = (d/5*100)+'%'; bar.style.width = (((item.endDay!==undefined?item.endDay:4)-d+1)/5*100)+'%'; } };
        const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); save(); };
        document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
      });
      if (rightH) rightH.addEventListener('mousedown', e => {
        e.preventDefault(); e.stopPropagation(); const item = getItem(); if (!item) return;
        const onMove = ev => { const d = getDay(ev.clientX); if (d >= (item.startDay||0)) { item.endDay = d; bar.style.width = ((d-(item.startDay||0)+1)/5*100)+'%'; } };
        const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); save(); };
        document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
      });
      bar.addEventListener('mousedown', e => {
        if (e.target.dataset.handle) return; e.preventDefault();
        const item = getItem(); if (!item) return;
        const startX = e.clientX, origStart = item.startDay||0, origEnd = item.endDay!==undefined?item.endDay:4, span = origEnd - origStart;
        const rect = track.getBoundingClientRect(), dayW = rect.width / 5;
        const onMove = ev => {
          const dayShift = Math.round((ev.clientX - startX) / dayW);
          let ns = origStart + dayShift, ne = ns + span;
          if (ns < 0) { ns = 0; ne = span; } if (ne > 4) { ne = 4; ns = 4 - span; }
          item.startDay = ns; item.endDay = ne; bar.style.left = (ns/5*100)+'%'; bar.style.width = ((ne-ns+1)/5*100)+'%';
        };
        const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); save(); };
        document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
      });
    });
  }

  const mainEl = document.getElementById('mainContent');

  function hc(e) {
    const el = e.target.closest('[data-action]'); if (!el) return;
    const a = el.dataset.action, key = wk(weekOff), w = gw(key), idx = parseInt(el.dataset.index);
    switch (a) {
      case 'addWin': w.wins.push({ text:'New win', owners:[], startDay:0, endDay:4 }); save(); render(); break;
      case 'deleteWin': w.wins.splice(idx,1); save(); render(); break;
      case 'addTask': w.tasks.push({ text:'New task', owners:[], done:false, blocked:false, startDay:0, endDay:4 }); save(); render(); break;
      case 'deleteTask': w.tasks.splice(idx,1); save(); render(); break;
      case 'toggleTask': {
        if (!admin) return;
        const wasDone = w.tasks[idx].done; w.tasks[idx].done = !wasDone;
        if (w.tasks[idx].done) { w.tasks[idx].blocked = false; const rect = el.getBoundingClientRect(); spawnConfetti(rect.left + rect.width/2, rect.top); }
        save(); render(); break;
      }
      case 'toggleBlocked': w.tasks[idx].blocked = !w.tasks[idx].blocked; if (w.tasks[idx].blocked) w.tasks[idx].done = false; save(); render(); break;
      case 'addBlocker': w.blockers.push({ text:'New blocker', owners:[], startDay:0, endDay:4 }); save(); render(); break;
      case 'deleteBlocker': w.blockers.splice(idx,1); save(); render(); break;
      case 'addNextWeek': w.nextWeek.push({ text:'Planned item', owners:[], startDay:0, endDay:4 }); save(); render(); break;
      case 'deleteNextWeek': w.nextWeek.splice(idx,1); save(); render(); break;
      case 'toggleOwner': {
        const type = el.dataset.type, mid = el.dataset.member;
        let arr;
        if (type==='win') arr=w.wins[idx]; else if (type==='task') arr=w.tasks[idx];
        else if (type==='blocker') arr=w.blockers[idx]; else if (type==='nextWeek'||type==='next') arr=w.nextWeek[idx];
        if (!arr) return; if (!arr.owners) arr.owners = [];
        const oi = arr.owners.indexOf(mid);
        if (oi >= 0) arr.owners.splice(oi,1); else arr.owners.push(mid);
        save(); render(); break;
      }
    }
  }
  function hi(e) {
    const el = e.target.closest('[data-action]'); if (!el) return;
    const a = el.dataset.action, key = wk(weekOff), w = gw(key), idx = parseInt(el.dataset.index), txt = el.textContent.trim();
    switch (a) {
      case 'editSummary': w.summary = txt; break;
      case 'editWin': w.wins[idx].text = txt; break;
      case 'editTask': w.tasks[idx].text = txt; break;
      case 'editBlocker': w.blockers[idx].text = txt; break;
      case 'editNextWeek': w.nextWeek[idx].text = txt; break;
    }
    save();
  }
  function hch(e) {
    const el = e.target.closest('[data-action]'); if (!el) return;
    if (el.dataset.action === 'changeStatus') { gw(wk(weekOff)).status = el.value; save(); render(); }
  }

  document.getElementById('prevWeek').addEventListener('click', () => { if (weekOff > getMinWeek()) { weekOff--; toggleDropdown(false); render(); } });
  document.getElementById('nextWeek').addEventListener('click', () => { if (weekOff < getMaxWeek()) { weekOff++; toggleDropdown(false); render(); } });
  document.getElementById('adminToggle').addEventListener('click', () => {
    if (admin) { admin = false; weekOff = Math.min(weekOff, 0); toggleDropdown(false); render(); }
    else spm();
  });
  document.getElementById('downloadPdf').addEventListener('click', () => { window.print(); });

  let pinStepNum = 1;
  function spm() {
    pinStepNum = 1;
    const o = document.getElementById('pinModal');
    document.getElementById('pinStep1').style.display = '';
    document.getElementById('pinStep2').style.display = 'none';
    document.getElementById('pinModalTitle').textContent = 'Admin Access';
    document.getElementById('pinModalSub').textContent = 'Enter 6-digit PIN to edit';
    document.getElementById('pinSubmit').textContent = 'Unlock';
    document.getElementById('patInput').value = '';
    o.classList.add('show');
    const inp = o.querySelectorAll('.pin-digit');
    inp.forEach(i => { i.value = ''; i.classList.remove('error'); });
    setTimeout(() => inp[0].focus(), 100);
  }
  function hpm() { document.getElementById('pinModal').classList.remove('show'); }

  const pi = document.querySelectorAll('#pinRow .pin-digit');
  pi.forEach((inp, i) => {
    inp.addEventListener('input', () => {
      inp.value = inp.value.replace(/\D/g, '').slice(-1);
      if (inp.value && i < PIN_LENGTH - 1) pi[i + 1].focus();
      if (inp.value && i === PIN_LENGTH - 1) setTimeout(() => tu(), 50);
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) pi[i - 1].focus();
      if (e.key === 'Enter') tu();
    });
  });
  document.getElementById('pinSubmit').addEventListener('click', tu);
  document.getElementById('patInput').addEventListener('keydown', e => { if (e.key === 'Enter') tu(); });
  document.getElementById('pinCancel').addEventListener('click', hpm);
  document.getElementById('pinModal').addEventListener('click', e => { if (e.target === e.currentTarget) hpm(); });

  function tu() {
    if (pinStepNum === 1) {
      const pin = Array.from(pi).map(i => i.value).join('');
      if (pin !== ADMIN_PIN) { pi.forEach(i => i.classList.add('error')); setTimeout(() => pi.forEach(i => { i.classList.remove('error'); i.value = ''; }), 500); pi[0].focus(); return; }
      if (getGistToken()) { admin = true; hpm(); render(); return; }
      pinStepNum = 2;
      document.getElementById('pinStep1').style.display = 'none';
      document.getElementById('pinStep2').style.display = '';
      document.getElementById('pinModalTitle').textContent = 'GitHub Token';
      document.getElementById('pinModalSub').textContent = 'Paste your Personal Access Token (gist scope)';
      document.getElementById('pinSubmit').textContent = 'Save & Continue';
      setTimeout(() => document.getElementById('patInput').focus(), 100);
    } else {
      const tok = document.getElementById('patInput').value.trim();
      if (!tok) { document.getElementById('patInput').style.borderColor = 'var(--red)'; setTimeout(() => document.getElementById('patInput').style.borderColor = '', 800); return; }
      setGistToken(tok); admin = true; hpm(); render();
    }
  }

  async function init() {
    allData = lc(); weekOff = 0; render();
    if (gistOk) {
      const gd = await lg();
      if (gd) { Object.keys(gd).forEach(k => { allData[k] = gd[k]; }); sc(); render(); }
    }
  }
  init();
</script>
</body>
</html>
